<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Failure Prediction System</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom Styles -->
    <style>
      body {
        background-color: #f8fbff;
      }

      .navbar {
        background-color: #0d6efd;
      }

      .navbar-brand {
        color: white !important;
        font-weight: bold;
        font-size: 20px;
      }

      .nav-link {
        color: white !important;
        transition: 0.3s;
      }

      .nav-link:hover {
        color: #dbeafe !important;
      }

      .card {
        border-radius: 12px;
      }

      .btn-primary {
        background-color: #0d6efd;
        border: none;
      }

      .btn-primary:hover {
        background-color: #0b5ed7;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg shadow">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <i class="bi bi-heart-pulse-fill me-2"></i>
          Heart Failure Prediction System
        </a>

        <button
          class="navbar-toggler bg-light"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Predict</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Layout -->
    <div class="container mt-5">
      <div class="row g-4">
        <!-- Form Column -->
        <div class="col-md-6">
          <div class="card shadow p-4">
            <h4 class="mb-3 text-primary">Patient Data Form</h4>

            <form>
              <div class="mb-3">
                <label class="form-label">Age</label>
                <input
                  type="number"
                  class="form-control"
                  placeholder="Enter age"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Blood Pressure</label>
                <input
                  type="number"
                  class="form-control"
                  placeholder="Enter value"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Serum Creatinine</label>
                <input
                  type="number"
                  step="0.1"
                  class="form-control"
                  placeholder="Enter value"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Ejection Fraction</label>
                <input
                  type="number"
                  class="form-control"
                  placeholder="Enter percentage"
                />
              </div>

              <button class="btn btn-primary w-100">Predict</button>
            </form>
          </div>
        </div>

        <!-- Results Column -->
        <div class="col-md-6">
          <div class="card shadow p-4 text-center">
            <h4 class="text-success">Prediction Result</h4>

            <div class="mt-4">
              <p class="fs-5">No prediction yet</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
